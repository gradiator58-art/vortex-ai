<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vortex AI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090f;--surface:#0d1018;--s2:#131720;--s3:#181e2a;
  --border:rgba(99,102,241,.15);--border2:rgba(99,102,241,.3);
  --accent:#6366f1;--accent2:#a78bfa;--accent3:#38bdf8;
  --text:#e8eaf6;--muted:#6b7280;--success:#34d399;--warn:#fbbf24;--danger:#f87171;
  --glow:0 0 40px rgba(99,102,241,.2);--r:16px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 70% 50% at 15% 15%,rgba(99,102,241,.1) 0,transparent 70%),
             radial-gradient(ellipse 50% 40% at 85% 85%,rgba(167,139,250,.08) 0,transparent 70%);}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}

/* LOGIN */
#loginPage{position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:44px 38px;width:100%;max-width:420px;box-shadow:var(--glow),0 24px 80px rgba(0,0,0,.6);animation:fadeUp .5s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.logo-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:28px;}
.logo-icon{width:64px;height:64px;background:linear-gradient(135deg,#6366f1,#a78bfa);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:14px;box-shadow:0 8px 32px rgba(99,102,241,.5);animation:glow 3s ease infinite;}
@keyframes glow{0%,100%{box-shadow:0 8px 32px rgba(99,102,241,.4)}50%{box-shadow:0 8px 56px rgba(99,102,241,.75)}}
.logo-title{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;background:linear-gradient(135deg,#e8eaf6,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo-sub{color:var(--muted);font-size:13px;text-align:center;margin-top:4px;line-height:1.5;}
.tabs{display:flex;background:var(--s2);border-radius:12px;padding:4px;margin-bottom:24px;}
.tab-btn{flex:1;padding:10px;border:none;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:14px;border-radius:10px;cursor:pointer;transition:all .3s;}
.tab-btn.active{background:linear-gradient(135deg,#6366f1,#7c3aed);color:#fff;font-weight:600;box-shadow:0 4px 16px rgba(99,102,241,.4);}
.g-btn{width:100%;padding:13px;background:#fff;color:#1a1a2e;border:none;border-radius:14px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:10px;cursor:pointer;transition:all .3s;margin-bottom:18px;}
.g-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,255,255,.15);}
.divider{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:12px;margin-bottom:18px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.ig{margin-bottom:14px;}
.ig label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;}
.ig input{width:100%;padding:13px 15px;background:var(--s2);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:all .3s;}
.ig input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.12);}
.main-btn{width:100%;padding:14px;background:linear-gradient(135deg,#6366f1,#7c3aed);color:#fff;border:none;border-radius:14px;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .3s;margin-top:6px;}
.main-btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(99,102,241,.5);}
.lf{text-align:center;margin-top:16px;font-size:13px;color:var(--muted);}
.lf a{color:var(--accent2);cursor:pointer;}

/* DASHBOARD */
#dashPage{display:none;min-height:100vh;position:relative;z-index:1;}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:255px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:22px 14px;z-index:200;transition:transform .3s;}
.sl-logo{display:flex;align-items:center;gap:10px;margin-bottom:28px;padding:0 6px;}
.sl-logo .ic{width:34px;height:34px;background:linear-gradient(135deg,#6366f1,#a78bfa);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;}
.sl-logo span{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;background:linear-gradient(135deg,#e8eaf6,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.nl{font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;padding:0 8px;margin-bottom:6px;margin-top:10px;}
.ni{display:flex;align-items:center;gap:9px;padding:10px 11px;border-radius:12px;cursor:pointer;transition:all .2s;color:var(--muted);font-size:13.5px;font-weight:500;margin-bottom:1px;}
.ni:hover{background:var(--s2);color:var(--text);}
.ni.active{background:rgba(99,102,241,.15);color:var(--accent2);}
.ni-ic{font-size:17px;}
.sb-bot{margin-top:auto;border-top:1px solid var(--border);padding-top:14px;}
.uc{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:12px;cursor:pointer;transition:all .2s;}
.uc:hover{background:var(--s2);}
.av{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#6366f1,#a78bfa);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0;}
.ui-name{font-size:13px;font-weight:600;}
.ui-role{font-size:11px;color:var(--muted);}

/* MAIN */
.main{margin-left:255px;min-height:100vh;display:flex;flex-direction:column;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 26px;border-bottom:1px solid var(--border);background:rgba(7,9,15,.85);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100;}
.topbar-l{display:flex;align-items:center;gap:10px;}
.tb-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;}
.topbar-r{display:flex;gap:8px;align-items:center;}
.ib{width:36px;height:36px;border-radius:10px;background:var(--s2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:all .2s;}
.ib:hover{border-color:var(--accent);background:rgba(99,102,241,.1);}
.hamburger{display:none;width:36px;height:36px;border-radius:10px;background:var(--s2);border:1px solid var(--border);align-items:center;justify-content:center;cursor:pointer;font-size:17px;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:190;}
.overlay.show{display:block;}

/* PANELS */
.panel{display:none;flex:1;flex-direction:column;}
.panel.active{display:flex;}

/* HOME */
.home-inner{padding:26px;overflow-y:auto;flex:1;}
.wb{background:linear-gradient(135deg,rgba(99,102,241,.12),rgba(167,139,250,.08));border:1px solid var(--border);border-radius:20px;padding:26px;margin-bottom:22px;position:relative;overflow:hidden;}
.wb::after{content:'⚡';position:absolute;right:26px;top:50%;transform:translateY(-50%);font-size:68px;opacity:.07;}
.wb h2{font-family:'Syne',sans-serif;font-size:21px;font-weight:800;margin-bottom:6px;}
.wb p{color:var(--muted);font-size:13.5px;line-height:1.6;}
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;margin-bottom:20px;}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:15px;padding:17px;transition:all .3s;cursor:pointer;}
.sc:hover{transform:translateY(-4px);box-shadow:var(--glow);border-color:var(--border2);}
.sc-ic{font-size:24px;margin-bottom:9px;}
.sc-lbl{font-size:10px;color:var(--muted);margin-bottom:3px;letter-spacing:.5px;}
.sc-val{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;}
.qg{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
.qc{background:var(--surface);border:1px solid var(--border);border-radius:15px;padding:17px;cursor:pointer;transition:all .3s;display:flex;align-items:center;gap:12px;}
.qc:hover{transform:translateY(-4px);box-shadow:var(--glow);border-color:var(--border2);}
.qc-ic{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;}
.bg-p{background:rgba(99,102,241,.2);}.bg-b{background:rgba(56,189,248,.2);}.bg-g{background:rgba(52,211,153,.2);}.bg-o{background:rgba(251,146,60,.2);}.bg-r{background:rgba(248,113,113,.2);}.bg-y{background:rgba(251,191,36,.2);}
.qc-info h4{font-size:13px;font-weight:600;margin-bottom:2px;}
.qc-info p{font-size:11.5px;color:var(--muted);}

/* CHAT */
.chat-wrap{display:flex;flex-direction:column;height:100vh;}
.chat-hdr{padding:16px 26px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
.online-dot{width:8px;height:8px;border-radius:50%;background:var(--success);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.chat-msgs{flex:1;overflow-y:auto;padding:18px 26px;display:flex;flex-direction:column;gap:13px;scroll-behavior:smooth;}
.msg{display:flex;gap:10px;max-width:82%;animation:msgIn .3s ease;}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse;align-self:flex-end;}
.msg-av{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.msg.ai .msg-av{background:linear-gradient(135deg,#6366f1,#a78bfa);}
.msg.user .msg-av{background:var(--s2);border:1px solid var(--border);}
.msg-b{padding:11px 15px;border-radius:14px;font-size:13.5px;line-height:1.65;}
.msg.ai .msg-b{background:var(--surface);border:1px solid var(--border);border-top-left-radius:4px;}
.msg.user .msg-b{background:linear-gradient(135deg,#6366f1,#7c3aed);color:#fff;border-top-right-radius:4px;}
.msg-img{max-width:220px;border-radius:10px;margin-top:5px;border:1px solid var(--border);display:block;}
.typing{display:flex;gap:5px;padding:11px 15px;background:var(--surface);border:1px solid var(--border);border-radius:14px;border-top-left-radius:4px;width:fit-content;}
.td{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:ty 1.4s ease infinite;}
.td:nth-child(2){animation-delay:.2s}.td:nth-child(3){animation-delay:.4s}
@keyframes ty{0%,100%{opacity:.3;transform:translateY(0)}50%{opacity:1;transform:translateY(-4px)}}
.chat-foot{padding:14px 26px;border-top:1px solid var(--border);}
.hints{display:flex;gap:7px;margin-bottom:9px;flex-wrap:wrap;}
.hc{padding:5px 11px;border-radius:20px;background:var(--s2);border:1px solid var(--border);font-size:11.5px;color:var(--muted);cursor:pointer;transition:all .2s;}
.hc:hover{color:var(--text);border-color:var(--accent);}
.ci-wrap{display:flex;gap:8px;align-items:flex-end;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:9px 12px;transition:all .3s;}
.ci-wrap:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.1);}
.ci-actions{display:flex;gap:5px;align-items:center;}
.ca-btn{width:30px;height:30px;border-radius:8px;background:var(--s2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:all .2s;flex-shrink:0;}
.ca-btn:hover{border-color:var(--accent);background:rgba(99,102,241,.1);}
#chatInput{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13.5px;resize:none;max-height:100px;line-height:1.5;min-height:20px;}
#chatInput::placeholder{color:var(--muted);}
.send-btn{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#6366f1,#7c3aed);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .2s;flex-shrink:0;}
.send-btn:hover{transform:scale(1.06);box-shadow:0 4px 16px rgba(99,102,241,.4);}
.send-btn:disabled{opacity:.4;cursor:default;transform:none;}
.preview-bar{display:flex;gap:8px;padding:6px 0;flex-wrap:wrap;}
.prev-item{position:relative;}
.prev-item img{width:56px;height:56px;object-fit:cover;border-radius:9px;border:1px solid var(--border);}
.prev-rm{position:absolute;top:-5px;right:-5px;width:17px;height:17px;background:var(--danger);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;cursor:pointer;color:#fff;border:none;}
.prev-file{background:var(--s2);border:1px solid var(--border);border-radius:9px;padding:5px 10px;font-size:11.5px;color:var(--muted);display:flex;align-items:center;gap:5px;}

/* IMAGE GEN */
.igen-wrap{padding:26px;overflow-y:auto;flex:1;}
.page-hdr{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:5px;}
.page-sub{color:var(--muted);font-size:13px;margin-bottom:22px;}
.igen-input{width:100%;padding:13px 15px;background:var(--surface);border:1px solid var(--border);border-radius:13px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13.5px;outline:none;margin-bottom:12px;transition:all .3s;resize:vertical;min-height:80px;}
.igen-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.1);}
.style-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:14px;}
.style-card{background:var(--surface);border:2px solid var(--border);border-radius:11px;padding:11px;cursor:pointer;transition:all .2s;text-align:center;font-size:11.5px;}
.style-card:hover,.style-card.active{border-color:var(--accent);background:rgba(99,102,241,.1);}
.style-ic{font-size:20px;margin-bottom:4px;}
.gen-btn{width:100%;padding:13px;background:linear-gradient(135deg,#6366f1,#7c3aed);color:#fff;border:none;border-radius:13px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .3s;margin-bottom:22px;}
.gen-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(99,102,241,.4);}
.gen-btn:disabled{opacity:.5;cursor:default;transform:none;}
.img-result{background:var(--surface);border:1px solid var(--border);border-radius:15px;overflow:hidden;}
.img-ph{width:100%;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted);}
.img-ph-ic{font-size:44px;opacity:.3;}
.gen-img{width:100%;display:block;}
.img-actions{display:flex;gap:9px;padding:13px;}

/* PHOTO EDITOR */
.photo-wrap{padding:26px;overflow-y:auto;flex:1;}
.upload-zone{border:2px dashed var(--border);border-radius:17px;padding:36px;text-align:center;cursor:pointer;transition:all .3s;margin-bottom:18px;}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:rgba(99,102,241,.05);}
.uz-ic{font-size:36px;margin-bottom:10px;opacity:.6;}
.uz-title{font-size:14px;font-weight:600;margin-bottom:4px;}
.uz-sub{font-size:12px;color:var(--muted);}
.uz-btns{display:flex;gap:9px;justify-content:center;margin-top:14px;flex-wrap:wrap;}
.uz-btn{padding:7px 14px;border-radius:9px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:12.5px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px;}
.uz-btn:hover{border-color:var(--accent);background:rgba(99,102,241,.1);}
.photo-editor{display:none;gap:18px;}
.photo-editor.show{display:flex;}
.pe-canvas-wrap{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:15px;overflow:hidden;display:flex;align-items:center;justify-content:center;min-height:280px;padding:12px;}
#editCanvas{max-width:100%;max-height:380px;border-radius:10px;}
.pe-tools{width:210px;}
.pt-section{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:14px;margin-bottom:11px;}
.pt-title{font-size:11px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:11px;}
.slider-row{display:flex;align-items:center;gap:8px;margin-bottom:9px;font-size:11.5px;}
.slider-row label{width:68px;color:var(--muted);}
.slider-row input[type=range]{flex:1;accent-color:var(--accent);}
.slider-row span{width:26px;text-align:right;font-size:10.5px;}
.filter-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}
.filter-btn{padding:7px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:10.5px;cursor:pointer;transition:all .2s;text-align:center;}
.filter-btn:hover,.filter-btn.active{border-color:var(--accent);color:var(--accent2);background:rgba(99,102,241,.1);}
.ae-btn{width:100%;padding:8px 11px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:11.5px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;margin-bottom:7px;font-family:'DM Sans',sans-serif;}
.ae-btn:hover{border-color:var(--accent);background:rgba(99,102,241,.1);color:var(--accent2);}

/* CODING */
.code-wrap{display:flex;flex-direction:column;height:100vh;}
.code-hdr{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.lang-select{background:var(--s2);border:1px solid var(--border);border-radius:9px;color:var(--text);padding:6px 11px;font-family:'DM Sans',sans-serif;font-size:12.5px;outline:none;cursor:pointer;}
.code-body{display:flex;flex:1;overflow:hidden;}
.code-left{flex:1;display:flex;flex-direction:column;border-right:1px solid var(--border);}
.code-toolbar{display:flex;gap:7px;padding:9px 14px;border-bottom:1px solid var(--border);background:var(--s2);}
.ct-btn{padding:5px 12px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11.5px;cursor:pointer;transition:all .2s;}
.ct-btn:hover,.ct-btn.sel{background:rgba(99,102,241,.15);color:var(--accent2);border-color:var(--accent);}
.ct-btn.run{background:linear-gradient(135deg,#6366f1,#7c3aed);color:#fff;border:none;}
.ct-btn.run:hover{box-shadow:0 4px 14px rgba(99,102,241,.4);}
#codeEditor{flex:1;width:100%;padding:14px;background:var(--s2);border:none;outline:none;color:var(--text);font-family:'Courier New',monospace;font-size:12.5px;resize:none;line-height:1.65;}
#codeOut{padding:10px 14px;border-top:1px solid var(--border);background:var(--bg);font-family:'Courier New',monospace;font-size:12px;color:var(--success);min-height:54px;max-height:110px;overflow-y:auto;display:none;}
.code-right{width:320px;display:flex;flex-direction:column;}
.code-ai-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;}
.code-ai-foot{padding:11px;border-top:1px solid var(--border);display:flex;gap:7px;}
#codeAiInput{flex:1;padding:9px 13px;background:var(--s2);border:1px solid var(--border);border-radius:11px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12.5px;outline:none;}
#codeAiInput:focus{border-color:var(--accent);}

/* FILES */
.files-wrap{padding:26px;overflow-y:auto;flex:1;}
.fhdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.files-hdr{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;}
.files-tabs{display:flex;gap:6px;}
.ft-btn{padding:6px 13px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;transition:all .2s;}
.ft-btn.active{background:rgba(99,102,241,.15);color:var(--accent2);border-color:var(--accent);}
.file-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:11px;margin-bottom:18px;}
.file-card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:14px;cursor:pointer;transition:all .3s;text-align:center;}
.file-card:hover{transform:translateY(-3px);b
